<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A86D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003A70;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="hydrationGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" style="stop-color:#00C4F0;stop-opacity:0.28" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001A3A" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="38" ry="38" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.08" stroke="white" stroke-width="0.8">
    <line x1="0" y1="50" x2="200" y2="50"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="150" x2="200" y2="150"/>
    <line x1="50" y1="0" x2="50" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
  </g>

  <!-- H badge (top center) -->
  <g transform="translate(100,32)" filter="url(#shadow)">
    <polygon points="0,-14 14,-5 10,12 0,7 -10,12 -14,-5"
      fill="#00C4F0" stroke="#0099BE" stroke-width="0.8"/>
    <text x="0" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold"
      font-size="9" fill="white">H</text>
  </g>

  <!-- Main circular element -->
  <g filter="url(#shadow)">
    <!-- Outer ring -->
    <circle cx="100" cy="100" r="46" fill="white"/>

    <!-- Inner face -->
    <circle cx="100" cy="100" r="38" fill="url(#bgGrad)"/>
    <circle cx="100" cy="100" r="38" fill="url(#hydrationGlow)"/>

    <!-- Water droplet fill -->
    <path d="M 100,67 C 116,79 129,93 129,108 C 129,124 115,135 100,135 C 85,135 71,124 71,108 C 71,93 84,79 100,67 Z"
      fill="white" opacity="0.12"/>
    <!-- Water droplet outline -->
    <path d="M 100,67 C 116,79 129,93 129,108 C 129,124 115,135 100,135 C 85,135 71,124 71,108 C 71,93 84,79 100,67 Z"
      fill="none" stroke="#00C4F0" stroke-width="1.5" opacity="0.75"/>

    <!-- Ripple rings -->
    <circle cx="100" cy="100" r="29" fill="none" stroke="#00C4F0" stroke-width="0.9" opacity="0.22"/>
    <circle cx="100" cy="100" r="19" fill="none" stroke="#00C4F0" stroke-width="0.9" opacity="0.32"/>

    <!-- Server / VM rack inside droplet -->
    <rect x="89" y="96" width="22" height="20" rx="1.5"
      fill="none" stroke="white" stroke-width="1.2" opacity="0.90"/>
    <line x1="89" y1="101.3" x2="111" y2="101.3" stroke="white" stroke-width="0.7" opacity="0.55"/>
    <line x1="89" y1="106.7" x2="111" y2="106.7" stroke="white" stroke-width="0.7" opacity="0.55"/>
    <line x1="89" y1="112.0" x2="111" y2="112.0" stroke="white" stroke-width="0.7" opacity="0.55"/>
    <!-- Status LEDs -->
    <circle cx="107" cy="98.7" r="1.5" fill="#00C4F0" opacity="0.95"/>
    <circle cx="103" cy="98.7" r="1.5" fill="#00C4F0" opacity="0.60"/>

    <!-- Outer ring highlight -->
    <circle cx="100" cy="100" r="38" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- Bottom labels -->
  <text x="100" y="168" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
    font-weight="bold" font-size="12" fill="white" letter-spacing="1" opacity="0.95">AZURE LOCAL</text>
  <text x="100" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
    font-weight="bold" font-size="9" fill="#00C4F0" letter-spacing="1.5" opacity="0.95">VM HYDRATION</text>
</svg>
