<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bgBanner" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003A70;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A86D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A86D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003A70;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="hydrationGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" style="stop-color:#00C4F0;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:0" />
    </radialGradient>
    <filter id="dropshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#001A3A" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="160" rx="16" ry="16" fill="url(#bgBanner)"/>

  <!-- Subtle terrain grid -->
  <g opacity="0.06" stroke="white" stroke-width="0.7">
    <line x1="0" y1="40" x2="640" y2="40"/>
    <line x1="0" y1="80" x2="640" y2="80"/>
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="160" y1="0" x2="160" y2="160"/>
    <line x1="320" y1="0" x2="320" y2="160"/>
    <line x1="480" y1="0" x2="480" y2="160"/>
  </g>

  <!-- Diagonal accent lines (faint) -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="161" y2="161"/>
    <line x1="161" y1="0" x2="0" y2="161"/>
  </g>

  <!-- Icon area background (left panel) -->
  <rect x="16" y="16" width="145" height="128" rx="20" fill="url(#bgIcon)" opacity="0.7"/>

  <!-- H badge -->
  <g transform="translate(89,30)" filter="url(#dropshadow)">
    <polygon points="0,-12 12,-4 8,10 0,6 -8,10 -12,-4"
      fill="#00C4F0" stroke="#0099BE" stroke-width="0.8"/>
    <text x="0" y="2" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold"
      font-size="7" fill="white">H</text>
  </g>

  <!-- Main circular element -->
  <g filter="url(#dropshadow)">
    <!-- Outer ring -->
    <circle cx="89" cy="90" r="38" fill="white"/>

    <!-- Inner face -->
    <circle cx="89" cy="90" r="32" fill="url(#bgIcon)"/>
    <circle cx="89" cy="90" r="32" fill="url(#hydrationGlow)"/>

    <!-- Water droplet fill -->
    <path d="M 89,60 C 104,71 116,84 116,97 C 116,111 104,120 89,120 C 74,120 62,111 62,97 C 62,84 74,71 89,60 Z"
      fill="white" opacity="0.11"/>
    <!-- Water droplet outline -->
    <path d="M 89,60 C 104,71 116,84 116,97 C 116,111 104,120 89,120 C 74,120 62,111 62,97 C 62,84 74,71 89,60 Z"
      fill="none" stroke="#00C4F0" stroke-width="1.3" opacity="0.75"/>

    <!-- Ripple rings -->
    <circle cx="89" cy="90" r="24" fill="none" stroke="#00C4F0" stroke-width="0.8" opacity="0.22"/>
    <circle cx="89" cy="90" r="15" fill="none" stroke="#00C4F0" stroke-width="0.8" opacity="0.32"/>

    <!-- Server / VM rack inside droplet -->
    <rect x="79.5" y="82" width="19" height="17" rx="1.5"
      fill="none" stroke="white" stroke-width="1.1" opacity="0.90"/>
    <line x1="79.5" y1="86.7" x2="98.5" y2="86.7" stroke="white" stroke-width="0.65" opacity="0.55"/>
    <line x1="79.5" y1="91.3" x2="98.5" y2="91.3" stroke="white" stroke-width="0.65" opacity="0.55"/>
    <line x1="79.5" y1="96.0" x2="98.5" y2="96.0" stroke="white" stroke-width="0.65" opacity="0.55"/>
    <!-- Status LEDs -->
    <circle cx="95.5" cy="84" r="1.3" fill="#00C4F0" opacity="0.95"/>
    <circle cx="92.0" cy="84" r="1.3" fill="#00C4F0" opacity="0.60"/>

    <!-- Outer ring highlight -->
    <circle cx="89" cy="90" r="32" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- Divider line -->
  <line x1="175" y1="24" x2="175" y2="136" stroke="white" stroke-width="0.8" opacity="0.25"/>

  <!-- Title text -->
  <text x="197" y="62" font-family="'Segoe UI', Arial, sans-serif" font-weight="700"
    font-size="34" fill="white" letter-spacing="-0.5" filter="url(#dropshadow)">Azure Local</text>
  <text x="197" y="112" font-family="'Segoe UI', Arial, sans-serif" font-weight="700"
    font-size="42" fill="#00C4F0" letter-spacing="0.5" filter="url(#dropshadow)">VM Hydration</text>

  <!-- Tagline -->
  <text x="197" y="139" font-family="'Segoe UI', Arial, sans-serif" font-style="italic"
    font-size="14" fill="white" opacity="0.7" letter-spacing="0.5">Revive. Reconnect. Reclaim.</text>

  <!-- Module badge -->
  <rect x="456" y="118" width="152" height="24" rx="12" fill="white" opacity="0.12"/>
  <text x="532" y="134" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
    font-size="12" fill="white" opacity="0.8" letter-spacing="0.5">PowerShell Automation</text>

  <!-- Decorative dots top right -->
  <g fill="white" opacity="0.15">
    <circle cx="580" cy="28" r="3"/>
    <circle cx="595" cy="28" r="3"/>
    <circle cx="610" cy="28" r="3"/>
    <circle cx="587" cy="42" r="3"/>
    <circle cx="602" cy="42" r="3"/>
    <circle cx="617" cy="42" r="3"/>
  </g>
</svg>
